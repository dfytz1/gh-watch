name: Build .NET Plugin

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Gh.Watch/Gh.Watch.csproj

      - name: Build
        run: dotnet build Gh.Watch/Gh.Watch.csproj --no-restore --configuration Release
